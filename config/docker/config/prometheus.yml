# Basset Hound Browser - Prometheus Configuration
# For monitoring browser performance and system metrics

global:
  # Metrics scrape interval
  scrape_interval: 15s

  # Evaluation interval for alerts
  evaluation_interval: 15s

  # External label for metrics
  external_labels:
    monitor: 'basset-hound-browser'
    environment: 'production'

# Alertmanager configuration (optional)
# alerting:
#   alertmanagers:
#     - static_configs:
#         - targets:
#           - 'localhost:9093'

# Rule files (optional)
# rule_files:
#   - "alert_rules.yml"

scrape_configs:
  # Node Exporter - System metrics
  - job_name: 'node-exporter'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['node-exporter:9100']
    relabel_configs:
      - source_labels: [__address__]
        target_label: instance
        replacement: 'system-metrics'

  # Prometheus self-monitoring
  - job_name: 'prometheus'
    metrics_path: '/metrics'
    scrape_interval: 15s
    scrape_timeout: 10s
    static_configs:
      - targets: ['localhost:9090']

  # Docker metrics (if Docker socket exposed)
  # Note: Requires special Docker daemon configuration
  # - job_name: 'docker'
  #   static_configs:
  #     - targets: ['host.docker.internal:9323']

  # Application custom metrics (future)
  # - job_name: 'basset-browser-metrics'
  #   static_configs:
  #     - targets: ['basset-browser:8765']
  #   metrics_path: '/metrics'
  #   scrape_interval: 10s
