# ══════════════════════════════════════════════════════════════════════════════
# RAG Bootstrap Configuration
# ══════════════════════════════════════════════════════════════════════════════
# This file configures the RAG system including ingestion paths, search settings,
# and LLM configuration.
#
# QUICK START (3 steps to customize for your project):
# ──────────────────────────────────────────────────────────────────────────────
# 1. Change the network name below (e.g., "myproject-rag")
# 2. Change the port if needed (default: 10000 → http://localhost:10000)
# 3. Configure ingestion directories below (folders are scanned recursively)
#
# Then run: ./deploy.sh start --build
# ══════════════════════════════════════════════════════════════════════════════

# Project name (used for container naming and logging)
project_name: basset-hound-docs-rag

# ──────────────────────────────────────────────────────────────────────────────
# Network Configuration (CUSTOMIZE THIS FOR YOUR PROJECT)
# ──────────────────────────────────────────────────────────────────────────────
network:
  # Docker network name - CHANGE THIS for each project to avoid conflicts
  # Example: "myproject-rag", "research-rag", "docs-rag"
  # If the name is already in use, deploy.sh will auto-increment (e.g., myproject-rag-1)
  name: basset-hound-docs-rag

  # Port exposed to localhost - ONLY ONE PORT for the entire stack
  # All services (postgres, redis, api) are internal to Docker network
  # Access the web UI at: http://localhost:{port}
  #
  # Port scheme: RAG_PORT_BASE=10000. This stack reserves the 10000-10019 band;
  # monitoring host ports are derived as base+offset by deploy.sh (see
  # .env.example for the RAG_<svc>_PORT table). A second instance / downstream
  # app should use 10020 and up.
  # NOTE: base+0 (10020) is occupied by the docs-rag-palletai stack on this host,
  # so this instance takes the next free slot in its band (10021). RAG_PORT_BASE
  # stays 10020, whose derived monitoring ports (10030-10036) remain free.
  port: 10021

# ──────────────────────────────────────────────────────────────────────────────
# Document Ingestion Settings (CUSTOMIZE YOUR DOCUMENT PATHS HERE)
# ──────────────────────────────────────────────────────────────────────────────
ingestion:
  # Directories containing documents to ingest
  # ────────────────────────────────────────
  # IMPORTANT: All directories are scanned RECURSIVELY
  # All subdirectories and files matching the extensions below will be ingested
  #
  # Supports: PDF, MD, TXT, LOG, JSON, YAML
  # Use HOST-absolute paths, or paths relative to the repo root (deploy.sh
  # resolves relative entries against its own directory before POSTing them
  # to the API).
  #
  # IMPORTANT: every directory must be equal to, or live under, DOCS_PATH —
  # the docs root mounted into the api container (default: <repo>/data/docs).
  # Paths outside DOCS_PATH are rejected with 400 by the default-on
  # ingest-root guard (RAG_INGEST_ROOT_GUARD=on), and paths not mounted in
  # the container cannot be ingested at all. Do NOT list container paths
  # like /data/docs here — always the host form. When you point DOCS_PATH
  # (.env) at your real docs root, update these entries to match.
  #
  # Examples:
  #   - ./data/docs                   (default — matches the default DOCS_PATH)
  #   - /home/user/project/knowledge  (absolute path; set DOCS_PATH to match)
  directories:
    - /home/devel/basset-hound-browser/docs   # this repo's docs (== DOCS_PATH)
    # - /path/to/your/documents   (must equal or live under DOCS_PATH)
    # - /another/folder/with/pdfs (must equal or live under DOCS_PATH)

  # File extensions to process (case-insensitive)
  # Add or remove extensions as needed for your use case
  extensions:
    - pdf
    - md
    - txt
    - log
    - json
    - yaml
    - yml

  # Exclude globs (matched against paths under each ingest directory)
  # ────────────────────────────────────────
  # Anything matching these patterns is SKIPPED, even if its extension is
  # listed above (exclude wins over extensions). The defaults keep
  # "point it at a whole repo" safe: VCS internals, dependency trees,
  # generated data, and bulk PDF corpora stay out of the index.
  # Remove "*.pdf" below if you deliberately want PDFs ingested.
  exclude:
    - ".git/"
    - "node_modules/"
    - "data/"
    - "*.pdf"

  # Auto-ingest: Watch for new files and ingest automatically
  # (Note: requires inotify support on Linux - experimental)
  auto_ingest: false

  # Chunking settings
  # ────────────────────────────────────────
  # Note: nomic-embed-text supports up to 8192 tokens, but smaller chunks
  # often yield better retrieval results and faster processing.
  #
  # Recommended values by use case:
  #   - Technical docs/code: 256-384 tokens (preserve procedure context)
  #   - General text: 256-512 tokens (default)
  #   - Conversational: 128-256 tokens (shorter context windows)
  #
  # If you experience Ollama timeouts during ingestion, try reducing chunk_size.
  # BluePlan project found 150 tokens with 30 overlap worked reliably.
  chunk_size: 256      # tokens per chunk (whitespace-based approximation)
  chunk_overlap: 50    # overlapping tokens between chunks (for context continuity)

  # Throughput / resilience settings
  # ────────────────────────────────────────
  # Max files processed in parallel during directory ingest; also caps
  # concurrent embedding requests to Ollama (asyncio semaphore).
  # Raise on a dedicated Ollama host; lower to 1-2 on a busy shared server.
  concurrent_files: 5

  # Retry strategy for transient embedding failures (Ollama timeout / 5xx):
  #   exponential  (delays 0.5s, 1s, 2s, ...)
  #   linear       (delays 0.5s, 1s, 1.5s, ...)
  # Attempt count and base delay are fixed in app/embeddings.py.
  retry_backoff: exponential

# Search settings
search:
  # Default search mode: hybrid, semantic, or keyword
  default_mode: hybrid

  # Number of results to return by default
  top_k: 5

  # Minimum similarity score (0.0 - 1.0)
  min_similarity: 0.7

# ──────────────────────────────────────────────────────────────────────────────
# Embedding Settings
# ──────────────────────────────────────────────────────────────────────────────
# CANONICAL DEFAULT (locked): nomic-embed-text / 768 / ollama
# The same triple is the fallback in .env.example, docker-compose.yml, and
# app/config.py — if you change any of the three values below, change it
# everywhere, and note that a dimension change invalidates the existing index
# (pgvector column width): expect a wipe + full re-embed (deploy.sh dim-guard
# refuses to start against a mismatched stored dimension).
embedding:
  # Model name (Ollama embedding model)
  # Recommended: nomic-embed-text (v1.5) - purpose-built for RAG
  # Alternatives:
  #   - mxbai-embed-large    (better accuracy, slower, 1.3GB)
  #   - qwen3-embedding:8b   (state-of-the-art MTEB #1, requires more resources)
  #   - all-minilm:l6-v2     (fast, lightweight, 384 dim)
  model: nomic-embed-text

  # Embedding dimension (must match model)
  # nomic-embed-text: 768 (default), can use 512/256 with Matryoshka
  # mxbai-embed-large: 1024
  # all-minilm: 384
  dimension: 768

  # Backend: ollama (recommended) or sentence-transformers
  # Using ollama offloads embedding to your Ollama server (same as LLM)
  # Using sentence-transformers runs embeddings in the API container
  # (NOT bundled by default — selecting it without the dependency installed
  # fails with an actionable error; see app/requirements.txt)
  backend: ollama

  # FUTURE: per-corpus embedding models (documented stanza, NOT yet implemented)
  # ────────────────────────────────────────
  # A later release may allow multiple embedding models side by side, keyed by
  # corpus/knowledge-base. Today only the single model/dimension/backend above
  # is honored; this stanza is ignored if uncommented and exists only to
  # reserve the schema.
  # models:
  #   - name: nomic-embed-text
  #     dimension: 768
  #     backend: ollama
  #     corpora: [default]
  #   - name: mxbai-embed-large
  #     dimension: 1024
  #     backend: ollama
  #     corpora: [research]

# LLM settings (Ollama)
llm:
  # Model to use for generation
  model: llama3.2:3b

  # Temperature for generation (0.0 - 1.0)
  temperature: 0.3

  # Request timeout in seconds
  timeout: 300

  # Ollama server URL (default assumes SSH forwarding to localhost)
  base_url: http://host.docker.internal:11434

# Database settings (PostgreSQL + pgvector)
database:
  host: postgres
  port: 5432
  name: ragdb
  user: raguser
  password: ragpass

# Cache settings (Redis)
cache:
  url: redis://redis:6379/0
