<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RAG Bootstrap</title>
  <link rel="stylesheet" href="css/theme.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/sidebar.css">
  <link rel="stylesheet" href="css/chat.css">
</head>
<body>
  <div id="app">
    <!-- Sidebar with document list -->
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <div class="sidebar-title">
          <span class="logo-icon">&#128218;</span>
          <span>RAG Bootstrap</span>
        </div>
        <button id="sidebar-toggle" class="sidebar-toggle" title="Collapse sidebar">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M11 19l-7-7 7-7M18 19l-7-7 7-7"/>
          </svg>
        </button>
      </div>

      <div class="sidebar-section">
        <div class="section-header">
          <span>DOCUMENTS</span>
          <button id="refresh-docs-btn" class="section-action" title="Refresh documents">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M23 4v6h-6M1 20v-6h6"/>
              <path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/>
            </svg>
          </button>
        </div>
        <div id="document-tree" class="file-tree">
          <div class="loading-placeholder">Loading documents...</div>
        </div>
        <div class="document-stats" id="document-stats"></div>
      </div>
    </aside>

    <!-- Main content area -->
    <main id="main-content" class="main-content">
      <!-- Action bar -->
      <div id="action-bar" class="action-bar">
        <div class="action-bar-left">
          <button id="sidebar-open-btn" class="action-btn sidebar-open-btn hidden" title="Open sidebar">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 12h18M3 6h18M3 18h18"/>
            </svg>
          </button>
          <span class="project-badge" id="project-badge">RAG Bootstrap</span>
        </div>
        <div class="action-bar-right">
          <button id="clear-chat-btn" class="action-btn" title="Clear conversation">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
            </svg>
            Clear
          </button>
          <button id="health-btn" class="action-btn" title="System health">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
            </svg>
            Health
          </button>
        </div>
      </div>

      <!-- Chat area -->
      <div id="chat-area" class="chat-area">
        <div id="messages" class="messages">
          <!-- Welcome message -->
          <div class="welcome-message" id="welcome-message">
            <h2>Welcome to RAG Bootstrap</h2>
            <p>Ask questions about your ingested documents. The system will search through your knowledge base and provide contextual answers.</p>
            <div class="quick-actions">
              <button class="quick-action" data-prompt="What documents are available?">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
                  <path d="M14 2v6h6M16 13H8M16 17H8M10 9H8"/>
                </svg>
                List documents
              </button>
              <button class="quick-action" data-prompt="Summarize the main topics in the knowledge base">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="11" cy="11" r="8"/>
                  <path d="M21 21l-4.35-4.35"/>
                </svg>
                Explore topics
              </button>
              <button class="quick-action" data-prompt="What can I ask you about?">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <circle cx="12" cy="12" r="10"/>
                  <path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3M12 17h.01"/>
                </svg>
                Get help
              </button>
            </div>
          </div>
        </div>
      </div>

      <!-- Chat input area -->
      <div class="chat-input-container">
        <!-- Feature toggles -->
        <div class="feature-toggles">
          <button class="toggle-chip active" data-feature="hybrid" title="Use hybrid search (semantic + keyword)">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="11" cy="11" r="8"/>
              <path d="M21 21l-4.35-4.35"/>
            </svg>
            Hybrid
          </button>
          <button class="toggle-chip" data-feature="semantic" title="Use semantic search only">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/>
            </svg>
            Semantic
          </button>
          <button class="toggle-chip" data-feature="keyword" title="Use keyword search only">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 7h16M4 12h16M4 17h10"/>
            </svg>
            Keyword
          </button>
          <div class="toggle-divider"></div>
          <button id="copy-all-btn" class="toggle-chip copy-all-btn" title="Copy entire conversation">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
            </svg>
            Copy All
          </button>
        </div>

        <!-- Input row -->
        <div class="chat-input-row">
          <textarea id="chat-input"
                    class="chat-input"
                    placeholder="Ask a question about your documents..."
                    rows="1"></textarea>
          <button id="send-btn" class="send-btn" title="Send message">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
            </svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Health overlay -->
  <div id="health-overlay" class="overlay hidden">
    <div class="overlay-content">
      <div class="overlay-header">
        <h3>System Health</h3>
        <button class="overlay-close">&times;</button>
      </div>
      <div class="overlay-body" id="health-body">
        <div class="loading-dots"><span></span><span></span><span></span></div>
      </div>
    </div>
  </div>

  <script src="js/markdown.js"></script>
  <script src="js/api.js"></script>
  <script src="js/chat.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
