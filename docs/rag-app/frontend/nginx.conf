server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript;
    gzip_min_length 1000;

    # Static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Directory ingest is ASYNC (POST /api/ingest/directory returns a
        # job_id immediately; poll /api/ingest/status/{job_id}), so no ingest
        # request holds the proxy open anymore. The generous read timeout only
        # covers idle gaps in LLM token streams (SSE/WebSocket) and the legacy
        # synchronous /api/ingest/directories route — the old 300s cliff that
        # 504'd large ingests is gone.
        proxy_connect_timeout 60s;
        proxy_send_timeout 300s;
        proxy_read_timeout 3600s;

        # Stream SSE token-by-token instead of buffering whole responses.
        proxy_buffering off;
    }

    # Proxy consumer health endpoints (GET /health/index) to backend.
    # Without this the SPA try_files above swallows them, answering
    # index.html with a 200 — client/fallback_policy.py and consuming
    # agents rely on /health/index working through the published port.
    location /health/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
}
