name: Build & Lint

on:
  push:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'
  pull_request:
    branches: [ main, develop ]
    paths-ignore:
      - 'docs/**'
      - '*.md'

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18.x, 20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint code
        run: npm run lint 2>/dev/null || echo "Lint config not found, skipping"

      - name: Type check
        run: npm run type-check 2>/dev/null || echo "Type check not configured"

      - name: Build distribution
        run: npm run build 2>/dev/null || echo "Build script not configured"

      - name: Check for build artifacts
        run: |
          if [ -d "dist" ]; then
            echo "Build artifacts found in dist/"
            du -sh dist/
          else
            echo "No dist directory found"
          fi

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-node${{ matrix.node-version }}
          path: dist/
          retention-days: 7
