name: Security Scanning

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    - cron: '0 2 * * *'  # Daily at 2am UTC

jobs:
  npm-audit:
    runs-on: ubuntu-latest
    name: NPM Security Audit

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate 2>&1 | tee npm-audit-report.txt
        continue-on-error: true

      - name: Check npm audit results
        run: |
          if npm audit --json 2>/dev/null | jq -e '.metadata.vulnerabilities.total > 0' 2>/dev/null; then
            echo "::warning::Vulnerabilities found in npm audit"
          fi

      - name: Upload audit report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: npm-audit-report
          path: npm-audit-report.txt
          retention-days: 30

  dependency-check:
    runs-on: ubuntu-latest
    name: Dependency Analysis

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: List production dependencies
        run: npm list --prod --depth=0 2>&1 | tee dependencies.txt

      - name: Check for outdated packages
        run: npm outdated 2>&1 | tee outdated-packages.txt || true

      - name: Upload dependency analysis
        uses: actions/upload-artifact@v4
        with:
          name: dependency-analysis
          path: |
            dependencies.txt
            outdated-packages.txt
          retention-days: 30

  codeql-analysis:
    runs-on: ubuntu-latest
    name: CodeQL Analysis
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'javascript' ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{ matrix.language }}"

  container-scan:
    runs-on: ubuntu-latest
    name: Container Image Scan
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: |
          docker build -t basset-hound-browser:ci-scan .

      - name: Scan with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'basset-hound-browser:ci-scan'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'HIGH,CRITICAL'

      - name: Upload Trivy scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
          wait-for-processing: true

      - name: Save scan report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-scan-report
          path: trivy-results.sarif
          retention-days: 30

  security-summary:
    runs-on: ubuntu-latest
    name: Security Summary
    if: always()
    needs: [npm-audit, dependency-check]

    steps:
      - name: Download all security artifacts
        uses: actions/download-artifact@v4
        with:
          path: security-artifacts

      - name: Create security summary
        run: |
          cat > security-summary.md << 'EOF'
          # Security Scan Summary

          Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')

          ## Scans Performed
          - NPM Audit (dependency vulnerabilities)
          - Dependency Analysis (versions and updates)
          - CodeQL Analysis (code quality & security)
          - Container Image Scan (Trivy)

          See artifacts for detailed results.

          ## Recommendations
          1. Review npm audit findings for HIGH and CRITICAL vulnerabilities
          2. Update outdated dependencies regularly
          3. Monitor CodeQL results for security issues
          4. Address container vulnerabilities before deployment
          EOF
          cat security-summary.md

      - name: Upload security summary
        uses: actions/upload-artifact@v4
        with:
          name: security-summary
          path: security-summary.md
          retention-days: 30
