# Basset Hound Browser - Kubernetes Horizontal Pod Autoscaler
# Automatically scales pod replicas based on resource metrics

apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: basset-hound-browser-hpa
  namespace: basset-hound
  labels:
    app: basset-hound-browser
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: basset-hound-browser

  minReplicas: 2
  maxReplicas: 10

  metrics:
  # CPU-based scaling
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70

  # Memory-based scaling
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

  # Custom metrics (if metrics server is installed)
  - type: Pods
    pods:
      metric:
        name: websocket_connections
      target:
        type: AverageValue
        averageValue: "100"

  # Scaling behavior
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
      - type: Percent
        value: 50
        periodSeconds: 15
      - type: Pods
        value: 1
        periodSeconds: 15
      selectPolicy: Min

    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
      - type: Percent
        value: 100
        periodSeconds: 15
      - type: Pods
        value: 2
        periodSeconds: 15
      selectPolicy: Max
