# Basset Hound Browser - Kubernetes ConfigMap Configuration
# Stores application configuration and startup scripts

apiVersion: v1
kind: ConfigMap
metadata:
  name: basset-hound-browser-config
  namespace: basset-hound
  labels:
    app: basset-hound-browser
data:
  # Application configuration
  LOG_LEVEL: "info"
  NODE_ENV: "production"
  ELECTRON_DISABLE_SANDBOX: "1"
  USE_SYSTEM_TOR: "true"

  # Display configuration
  DISPLAY: ":99"
  SCREEN_RESOLUTION: "1920x1080x24"

  # Tor configuration
  TOR_SOCKS_PORT: "9050"
  TOR_CONTROL_PORT: "9051"

  # WebSocket configuration
  WEBSOCKET_PORT: "8765"
  WEBSOCKET_MAX_CONNECTIONS: "1000"
  WEBSOCKET_TIMEOUT: "30"

  # Performance configuration
  NODE_MAX_HTTP_HEADER_SIZE: "16384"
  NODE_OPTIONS: "--max-old-space-size=1024 --expose-gc"

  # Logging configuration
  LOG_FORMAT: "json"
  LOG_OUTPUT: "stdout"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: basset-hound-tor-config
  namespace: basset-hound
  labels:
    app: basset-hound-browser
data:
  torrc: |
    # Basset Hound Browser - Kubernetes Tor Configuration

    # SOCKS5 proxy
    SocksPort 127.0.0.1:9050

    # Control port for circuit management
    ControlPort 127.0.0.1:9051

    # Data directory
    DataDirectory /var/lib/tor

    # Authentication
    CookieAuthentication 1
    CookieAuthFile /var/lib/tor/control_auth_cookie
    CookieAuthFileGroupReadable 1

    # Access control
    SocksPolicy accept 127.0.0.1
    SocksPolicy reject *

    # Logging
    SafeLogging 1
    Log notice stdout

    # Performance
    AvoidDiskWrites 1
    CircuitBuildTimeout 30
    LearnCircuitBuildTimeout 0
    MaxCircuitDirtiness 600
